name: ✨ Feature Request
description: Suggest a new feature for Ledger
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in Ledger.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've thought of.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Dashboard / Analytics
        - Transactions
        - AI Advisor
        - Import / Export
        - Investments
        - Credit Health
        - Accounts
        - API / Webhooks
        - Mobile / PWA
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your opinion)
      options:
        - Nice to have
        - Important
        - Critical
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, screenshots, or links to similar features.
    validations:
      required: false
