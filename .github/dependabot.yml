version: 2
updates:
  # Python backend
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    reviewers: ["your-username"]
    commit-message:
      prefix: "deps(py):"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Node frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    reviewers: ["your-username"]
    commit-message:
      prefix: "deps(js):"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci):"
