name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Backend Node ──────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Node Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend-node/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        run: |
          SIZE=$(du -sb dist/ | cut -f1)
          echo "Bundle size: $(( SIZE / 1024 )) KB"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::warning::Bundle exceeds 5MB ($SIZE bytes). Consider code-splitting."
          fi
